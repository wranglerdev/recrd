name: CI

on:
  push:
    branches:
      - main
      - 'tdd/phase-*'
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_SYSTEM_NET_DISABLEIPV6: '1'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Assert Recrd.Core has zero Recrd.* references
        run: |
          if grep -E '<ProjectReference[^>]*Include="[^"]*Recrd\.' \
              packages/Recrd.Core/Recrd.Core.csproj; then
            echo "ERROR: Recrd.Core must not reference any Recrd.* project"
            exit 1
          fi
          echo "OK: Recrd.Core has zero Recrd.* references"

      - name: Test
        if: ${{ !startsWith(github.ref_name, 'tdd/phase-') }}
        run: dotnet test --no-build --filter "Category!=Integration"

      - name: Test (TDD red-phase — failures allowed)
        if: ${{ startsWith(github.ref_name, 'tdd/phase-') }}
        continue-on-error: true
        run: dotnet test --no-build --filter "Category!=Integration"

      - name: Coverage gate — Recrd.Core (90% line)
        run: >
          dotnet test tests/Recrd.Core.Tests/Recrd.Core.Tests.csproj
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include="[Recrd.Core]*"
          /p:ExcludeByFile="**/obj/**/*.cs"
          /p:Threshold=90
          /p:ThresholdType=line
          /p:ThresholdStat=minimum

      - name: Coverage gate — Recrd.Data (90% line)
        run: >
          dotnet test tests/Recrd.Data.Tests/Recrd.Data.Tests.csproj
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include="[Recrd.Data]*"
          /p:ExcludeByFile="**/obj/**/*.cs"
          /p:Threshold=90
          /p:ThresholdType=line
          /p:ThresholdStat=minimum

      - name: Coverage gate — Recrd.Gherkin (90% line)
        run: >
          dotnet test tests/Recrd.Gherkin.Tests/Recrd.Gherkin.Tests.csproj
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include="[Recrd.Gherkin]*"
          /p:ExcludeByFile="**/obj/**/*.cs"
          /p:Threshold=90
          /p:ThresholdType=line
          /p:ThresholdStat=minimum

      - name: Coverage gate — Recrd.Compilers (90% line)
        run: >
          dotnet test tests/Recrd.Compilers.Tests/Recrd.Compilers.Tests.csproj
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include="[Recrd.Compilers]*"
          /p:ExcludeByFile="**/obj/**/*.cs"
          /p:Threshold=90
          /p:ThresholdType=line
          /p:ThresholdStat=minimum

      - name: Install Playwright browsers (for Recording tests)
        run: bash packages/Recrd.Recording/bin/Debug/net10.0/playwright.sh install chromium

      - name: Coverage gate — Recrd.Recording (90% line)
        run: >
          dotnet test tests/Recrd.Recording.Tests/Recrd.Recording.Tests.csproj
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include="[Recrd.Recording]*"
          /p:ExcludeByFile="**/obj/**/*.cs"
          /p:Threshold=90
          /p:ThresholdType=line
          /p:ThresholdStat=minimum

      - name: Setup Node.js (for rfbrowser init)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Robot Framework and libraries
        run: |
          pip install robotframework robotframework-browser robotframework-seleniumlibrary
          rfbrowser init

      - name: Integration tests (E2E round-trip)
        if: ${{ !startsWith(github.ref_name, 'tdd/phase-') }}
        run: >
          dotnet test tests/Recrd.Integration.Tests/Recrd.Integration.Tests.csproj
          --no-build
          --filter "Category=Integration"

      - name: Integration tests (TDD red-phase — failures allowed)
        if: ${{ startsWith(github.ref_name, 'tdd/phase-') }}
        continue-on-error: true
        run: >
          dotnet test tests/Recrd.Integration.Tests/Recrd.Integration.Tests.csproj
          --no-build
          --filter "Category=Integration"

      - name: Coverage gate - recrd-cli (80% line)
        run: >
          dotnet test tests/Recrd.Cli.Tests/Recrd.Cli.Tests.csproj
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include="[recrd]*"
          /p:ExcludeByFile="**/obj/**/*.cs"
          /p:Threshold=80
          /p:ThresholdType=line
          /p:ThresholdStat=minimum

      - name: Check code style
        run: dotnet format --verify-no-changes
