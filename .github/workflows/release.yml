name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_SYSTEM_NET_DISABLEIPV6: '1'
  PROJECT_NAME: recrd-cli
  SOLUTION_PATH: recrd.sln

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Restore dependencies
        run: |
          dotnet restore
          dotnet restore tests/Recrd.Cli.Tests/Plugins/TestFixtures/FakePlugin.csproj

      - name: Build in Release mode
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --filter "Category!=Integration"

      - name: Pack NuGet packages
        run: |
          dotnet pack --no-build --configuration Release \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            --output ./nupkg

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkg/*.nupkg

  build-binaries:
    needs: build-and-pack
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: recrd-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact_name: recrd-win-x64
          - os: macos-latest
            rid: osx-x64
            artifact_name: recrd-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact_name: recrd-osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore
          dotnet restore tests/Recrd.Cli.Tests/Plugins/TestFixtures/FakePlugin.csproj

      - name: Publish Binary
        run: |
          dotnet publish apps/recrd-cli/recrd-cli.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version=${{ needs.build-and-pack.outputs.version }} \
            --output ./publish

      - name: Prepare Artifact
        shell: bash
        run: |
          cd publish
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            zip -r ../${{ matrix.artifact_name }}.zip .
          else
            tar -czvf ../${{ matrix.artifact_name }}.tar.gz .
          fi

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: recrd-${{ matrix.rid }}.*

  create-release:
    needs: [build-and-pack, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/**/*.zip
            ./artifacts/**/*.tar.gz
            ./artifacts/**/*.nupkg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
