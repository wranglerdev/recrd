name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish for ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        env:
          DOTNET_SYSTEM_NET_DISABLEIPV6: 1
        run: dotnet publish apps/recrd-cli/recrd-cli.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -o ./publish/${{ matrix.rid }}

      - name: Verify .playwright folder
        shell: bash
        run: |
          if [ ! -d "./publish/${{ matrix.rid }}/.playwright" ]; then
            echo "Error: .playwright folder not found in publish output"
            exit 1
          fi
          ls -R ./publish/${{ matrix.rid }}
          chmod +x ./publish/${{ matrix.rid }}/recrd || true
          chmod +x ./publish/${{ matrix.rid }}/playwright.sh || true

      - name: Package ZIP (Win/Mac)
        if: matrix.os == 'windows-latest' || matrix.os == 'macos-latest'
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd ./publish/${{ matrix.rid }}
          zip -r ../../recrd-$VERSION-${{ matrix.rid }}.zip .

      - name: Package TAR.GZ (Linux/Mac)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd ./publish/${{ matrix.rid }}
          tar -czf ../../recrd-$VERSION-${{ matrix.rid }}.tar.gz .

      - name: Generate Checksums
        shell: bash
        run: |
          for f in recrd-*; do
            if [ -f "$f" ]; then
              sha256sum "$f" > "$f.sha256"
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.rid }}
          path: |
            recrd-*
          if-no-files-found: error

  validate:
    name: Validate Manifests (${{ matrix.type }})
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            type: homebrew
          - os: windows-latest
            type: winget
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Prepare Manifests
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          SHA256_WIN=$(cat dist-artifacts/recrd-$VERSION-win-x64.zip.sha256 | cut -d' ' -f1)
          SHA256_OSX_X64=$(cat dist-artifacts/recrd-$VERSION-osx-x64.tar.gz.sha256 | cut -d' ' -f1)
          SHA256_OSX_ARM64=$(cat dist-artifacts/recrd-$VERSION-osx-arm64.tar.gz.sha256 | cut -d' ' -f1)
          
          sed -i "s/{{VERSION}}/$VERSION/g" dist/homebrew/recrd.rb
          sed -i "s/{{SHA256}}/$SHA256_OSX_X64/g" dist/homebrew/recrd.rb
          sed -i "s/{{SHA256_ARM}}/$SHA256_OSX_ARM64/g" dist/homebrew/recrd.rb
          
          # Replace remote URL with local file URL for testing
          # pwd output starts with / so file://$(pwd) is file:///home/...
          sed -i "s|https://github.com/recrd/recrd/releases/download/v$VERSION|file://$(pwd)/dist-artifacts|g" dist/homebrew/recrd.rb
          
          sed -i "s/{{VERSION}}/$VERSION/g" dist/winget/recrd.yaml
          sed -i "s/{{SHA256_WIN}}/$SHA256_WIN/g" dist/winget/recrd.yaml

      - name: Validate Homebrew
        if: matrix.type == 'homebrew'
        run: |
          brew install --build-from-source ./dist/homebrew/recrd.rb
          recrd --version

      - name: Validate Winget
        if: matrix.type == 'winget'
        shell: pwsh
        run: |
          if (Get-Command winget -ErrorAction SilentlyContinue) {
            winget validate dist/winget/recrd.yaml
          } else {
            Write-Host "winget command not found, skipping validation but file exists."
            Get-Content dist/winget/recrd.yaml
          }

  release:
    name: Create GitHub Release
    needs: [publish, validate]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binaries-*
          merge-multiple: true

      - name: List files
        run: ls -R dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
